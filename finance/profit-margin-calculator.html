<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profit Margin Calculator — Free Online Calculator | Calculator Studio</title>
<meta name="description" content="Calculate profit, margin percentage and markup percentage.">
<link rel="canonical" href="https://example.com/finance/profit-margin-calculator.html">
<link rel="icon" href="../images/logo-white.png">
<link rel="manifest" href="../manifest.json">
<link rel="apple-touch-icon" href="../images/logo-white.png">
<meta name="theme-color" content="#D4AF37">
<link rel="stylesheet" href="../css/style.css?v=2">
<link rel="stylesheet" href="../css/responsive.css?v=2">
<link rel="stylesheet" href="../css/animations.css?v=2">
</head>
<body>
<script>const ROOT="../";</script>
<div id="site-header"></div>
<main class="container">
  <div class="breadcrumb"><a href="../index.html">Home</a> / <a href="index.html">Finance</a> / Profit Margin Calculator</div>
  <h1 class="calc-page-title">Profit Margin Calculator</h1>
  <p class="calc-page-desc">Calculate profit, margin percentage and markup percentage from cost and selling price.</p>
  <div class="calc-layout">
    <div class="panel">
      <form id="calc-form">
        <div class="field-row">
          <div class="field"><label>Cost Price</label><input type="number" id="cost" step="any" required></div>
          <div class="field"><label>Selling Price</label><input type="number" id="sell" step="any" required></div>
        </div>
        <button type="submit" class="btn btn-solid">Calculate</button>
      </form>
      <div class="result-box hidden" id="result-box">
        <div class="label">Profit / Margin / Markup</div>
        <div class="value" id="result-value">—</div>
      </div>
      <div class="action-row">
        <button class="btn btn-ghost" onclick="copyResultText('#result-value')">Copy Result</button>
        <button class="btn btn-ghost" onclick="shareCurrentPage()">Share</button>
        <button class="btn btn-ghost" type="button" onclick="location.reload()">Reset</button>
      </div>
    </div>
    <div class="panel"><div class="info-block"><h2>Formula</h2><div class="formula">profit = sell − cost<br>margin% = profit/sell × 100<br>markup% = profit/cost × 100</div></div></div>
  </div>
  <div class="info-block"><h2>Related Calculators</h2><div class="related-grid" id="related-grid"></div></div>
</main>
<div id="site-footer"></div>
<script src="../js/calc-data.js"></script>
<script src="../js/main.js?v=2"></script>
<script src="../js/theme.js?v=2"></script>
<script src="../js/calculator.js"></script>
<script>
document.getElementById("calc-form").addEventListener("submit", function(e){
  e.preventDefault();
  const cost = parseFloat(document.getElementById("cost").value);
  const sell = parseFloat(document.getElementById("sell").value);
  const profit = sell-cost;
  const margin = (profit/sell)*100;
  const markup = (profit/cost)*100;
  showResult("#result-box", `Profit: ${formatNumber(profit)} | Margin: ${formatNumber(margin)}% | Markup: ${formatNumber(markup)}%`);
});
document.addEventListener("DOMContentLoaded", ()=>{
  const related = calcsByCategory("finance").filter(c=>!c.url.includes("profit-margin-calculator")).slice(0,4);
  document.getElementById("related-grid").innerHTML = related.map(CalcUI.calcCard).join("");
});
</script>
</body>
</html>
