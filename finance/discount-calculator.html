<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discount Calculator — Free Online Calculator | Calculator Studio</title>
<meta name="description" content="Calculate discounted price and amount saved.">
<link rel="canonical" href="https://example.com/finance/discount-calculator.html">
<link rel="icon" href="../images/logo.png">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/responsive.css">
<link rel="stylesheet" href="../css/animations.css">
</head>
<body>
<script>const ROOT="../";</script>
<div id="site-header"></div>
<main class="container">
  <div class="breadcrumb"><a href="../index.html">Home</a> / <a href="index.html">Finance</a> / Discount Calculator</div>
  <h1 class="calc-page-title">Discount Calculator</h1>
  <p class="calc-page-desc">Calculate the final price after a discount, and how much you save.</p>
  <div class="calc-layout">
    <div class="panel">
      <form id="calc-form">
        <div class="field-row">
          <div class="field"><label>Original Price</label><input type="number" id="price" step="any" required></div>
          <div class="field"><label>Discount (%)</label><input type="number" id="discount" step="any" required></div>
        </div>
        <button type="submit" class="btn btn-solid">Calculate</button>
      </form>
      <div class="result-box hidden" id="result-box">
        <div class="label">Final Price</div>
        <div class="value" id="result-value">—</div>
      </div>
      <div class="action-row">
        <button class="btn btn-ghost" onclick="copyResultText('#result-value')">Copy Result</button>
        <button class="btn btn-ghost" onclick="shareCurrentPage()">Share</button>
        <button class="btn btn-ghost" type="button" onclick="location.reload()">Reset</button>
      </div>
    </div>
    <div class="panel"><div class="info-block"><h2>Formula</h2><div class="formula">final = price × (1 − discount/100)</div><h2>Example</h2><p>$100 with 20% off = $80 (you save $20)</p></div></div>
  </div>
  <div class="info-block"><h2>Related Calculators</h2><div class="related-grid" id="related-grid"></div></div>
</main>
<div id="site-footer"></div>
<script src="../js/calc-data.js"></script>
<script src="../js/main.js"></script>
<script src="../js/theme.js"></script>
<script src="../js/calculator.js"></script>
<script>
document.getElementById("calc-form").addEventListener("submit", function(e){
  e.preventDefault();
  const price = parseFloat(document.getElementById("price").value);
  const discount = parseFloat(document.getElementById("discount").value);
  const final = price*(1-discount/100);
  const saved = price-final;
  showResult("#result-box", `${formatNumber(final)} (you save ${formatNumber(saved)})`);
});
document.addEventListener("DOMContentLoaded", ()=>{
  const related = calcsByCategory("finance").filter(c=>!c.url.includes("discount-calculator")).slice(0,4);
  document.getElementById("related-grid").innerHTML = related.map(CalcUI.calcCard).join("");
});
</script>
</body>
</html>
