<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salary Calculator — Free Online Calculator | Calculator Studio</title>
<meta name="description" content="Convert salary between hourly, monthly and yearly figures.">
<link rel="canonical" href="https://example.com/finance/salary-calculator.html">
<link rel="icon" href="../images/logo-white.png">
<link rel="manifest" href="../manifest.json">
<link rel="apple-touch-icon" href="../images/logo-white.png">
<meta name="theme-color" content="#D4AF37">
<link rel="stylesheet" href="../css/style.css?v=2">
<link rel="stylesheet" href="../css/responsive.css?v=2">
<link rel="stylesheet" href="../css/animations.css?v=2">
</head>
<body>
<script>const ROOT="../";</script>
<div id="site-header"></div>
<main class="container">
  <div class="breadcrumb"><a href="../index.html">Home</a> / <a href="index.html">Finance</a> / Salary Calculator</div>
  <h1 class="calc-page-title">Salary Calculator</h1>
  <p class="calc-page-desc">Convert your salary between hourly, monthly and yearly figures.</p>
  <div class="calc-layout">
    <div class="panel">
      <form id="calc-form">
        <div class="field"><label>Amount</label><input type="number" id="amount" step="any" required></div>
        <div class="field-row">
          <div class="field"><label>Period</label><select id="period"><option value="hourly">Hourly</option><option value="monthly">Monthly</option><option value="yearly">Yearly</option></select></div>
          <div class="field"><label>Hours / Week</label><input type="number" id="hours" value="40"></div>
        </div>
        <button type="submit" class="btn btn-solid">Calculate</button>
      </form>
      <div class="result-box hidden" id="result-box">
        <div class="label">Converted Salary</div>
        <div class="value" id="result-value">—</div>
      </div>
      <div class="action-row">
        <button class="btn btn-ghost" onclick="copyResultText('#result-value')">Copy Result</button>
        <button class="btn btn-ghost" onclick="shareCurrentPage()">Share</button>
        <button class="btn btn-ghost" type="button" onclick="location.reload()">Reset</button>
      </div>
    </div>
    <div class="panel"><div class="info-block"><h2>Formula</h2><div class="formula">yearly = hourly × hours/week × 52<br>monthly = yearly / 12</div></div></div>
  </div>
  <div class="info-block"><h2>Related Calculators</h2><div class="related-grid" id="related-grid"></div></div>
</main>
<div id="site-footer"></div>
<script src="../js/calc-data.js"></script>
<script src="../js/main.js?v=2"></script>
<script src="../js/theme.js?v=2"></script>
<script src="../js/calculator.js"></script>
<script>
document.getElementById("calc-form").addEventListener("submit", function(e){
  e.preventDefault();
  const amount = parseFloat(document.getElementById("amount").value);
  const period = document.getElementById("period").value;
  const hours = parseFloat(document.getElementById("hours").value)||40;
  let yearly;
  if(period==="hourly") yearly = amount*hours*52;
  else if(period==="monthly") yearly = amount*12;
  else yearly = amount;
  const monthly = yearly/12;
  const hourly = yearly/(hours*52);
  showResult("#result-box", `Hourly: ${formatNumber(hourly)} | Monthly: ${formatNumber(monthly)} | Yearly: ${formatNumber(yearly)}`);
});
document.addEventListener("DOMContentLoaded", ()=>{
  const related = calcsByCategory("finance").filter(c=>!c.url.includes("salary-calculator")).slice(0,4);
  document.getElementById("related-grid").innerHTML = related.map(CalcUI.calcCard).join("");
});
</script>
</body>
</html>
