<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lorem Ipsum Generator — Free Online Tool | Calculator Studio</title>
<meta name="description" content="Generate placeholder Lorem Ipsum text for design mockups.">
<link rel="canonical" href="https://example.com/programming/lorem-ipsum-generator.html">
<link rel="icon" href="../images/logo-white.png">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/responsive.css">
<link rel="stylesheet" href="../css/animations.css">
<style>textarea.ta{width:100%;padding:12px;border-radius:8px;border:1px solid var(--border);background:var(--bg-alt);color:var(--text);font-family:inherit;min-height:220px}</style>
</head>
<body>
<script>const ROOT="../";</script>
<div id="site-header"></div>
<main class="container">
  <div class="breadcrumb"><a href="../index.html">Home</a> / <a href="index.html">Programming</a> / Lorem Ipsum Generator</div>
  <h1 class="calc-page-title">Lorem Ipsum Generator</h1>
  <p class="calc-page-desc">Generate placeholder Lorem Ipsum text for mockups and layouts.</p>
  <div class="calc-layout">
    <div class="panel">
      <form id="calc-form">
        <div class="field-row">
          <div class="field"><label>Paragraphs</label><input type="number" id="paras" value="3" min="1" max="20"></div>
          <div class="field"><label>Words per Paragraph</label><input type="number" id="words" value="50" min="5" max="300"></div>
        </div>
        <button type="submit" class="btn btn-solid">Generate</button>
      </form>
      <div class="result-box hidden" id="result-box">
        <div class="label">Generated Text</div>
        <textarea class="ta" id="result-value" readonly></textarea>
      </div>
      <div class="action-row">
        <button class="btn btn-ghost" onclick="copyLoremResult()">Copy Result</button>
        <button class="btn btn-ghost" type="button" onclick="location.reload()">Reset</button>
      </div>
    </div>
    <div class="panel"><div class="info-block"><h2>How It Works</h2><p>Generates classic Lorem Ipsum placeholder paragraphs from a fixed word bank.</p></div></div>
  </div>
  <div class="info-block"><h2>Related Calculators</h2><div class="related-grid" id="related-grid"></div></div>
</main>
<div id="site-footer"></div>
<script src="../js/calc-data.js"></script>
<script src="../js/main.js"></script>
<script src="../js/theme.js"></script>
<script>
const WORDS = "lorem ipsum dolor sit amet consectetur adipiscing elit sed do eiusmod tempor incididunt ut labore et dolore magna aliqua enim ad minim veniam quis nostrud exercitation ullamco laboris nisi aliquip ex ea commodo consequat duis aute irure in reprehenderit voluptate velit esse cillum eu fugiat nulla pariatur excepteur sint occaecat cupidatat non proident sunt culpa qui officia deserunt mollit anim id est laborum".split(" ");
function genParagraph(wordCount){
  let out = [];
  for(let i=0;i<wordCount;i++) out.push(WORDS[Math.floor(Math.random()*WORDS.length)]);
  let text = out.join(" ");
  return text.charAt(0).toUpperCase()+text.slice(1)+".";
}
document.getElementById("calc-form").addEventListener("submit", function(e){
  e.preventDefault();
  const paras = parseInt(document.getElementById("paras").value);
  const words = parseInt(document.getElementById("words").value);
  const text = Array.from({length:paras},()=>genParagraph(words)).join("\n\n");
  document.getElementById("result-box").classList.remove("hidden");
  document.getElementById("result-value").value = text;
});
function copyLoremResult(){
  const el = document.getElementById("result-value");
  navigator.clipboard.writeText(el.value).then(()=>alert("Copied to clipboard!"));
}
document.addEventListener("DOMContentLoaded", ()=>{
  const related = calcsByCategory("programming").filter(c=>!c.url.includes("lorem-ipsum-generator")).slice(0,4);
  document.getElementById("related-grid").innerHTML = related.map(CalcUI.calcCard).join("");
});
</script>
</body>
</html>
