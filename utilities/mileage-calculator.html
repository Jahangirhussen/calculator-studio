<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mileage Calculator — Free Online Calculator | Calculator Studio</title>
<meta name="description" content="Calculate vehicle fuel mileage in km/l and mpg.">
<link rel="canonical" href="https://example.com/utilities/mileage-calculator.html">
<link rel="icon" href="../images/logo-white.png">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/responsive.css">
<link rel="stylesheet" href="../css/animations.css">
</head>
<body>
<script>const ROOT="../";</script>
<div id="site-header"></div>
<main class="container">
  <div class="breadcrumb"><a href="../index.html">Home</a> / <a href="index.html">Utilities</a> / Mileage Calculator</div>
  <h1 class="calc-page-title">Mileage Calculator</h1>
  <p class="calc-page-desc">Calculate your vehicle's fuel mileage.</p>
  <div class="calc-layout">
    <div class="panel">
      <form id="calc-form">
        <div class="field"><label>Distance Traveled (km)</label><input type="number" step="any" id="distance" required></div>
        <div class="field"><label>Fuel Consumed (liters)</label><input type="number" step="any" id="fuel" required></div>
        <button type="submit" class="btn btn-solid">Calculate</button>
      </form>
      <div class="result-box hidden" id="result-box">
        <div class="label">Mileage</div>
        <div class="value" id="result-value">—</div>
      </div>
      <div class="action-row">
        <button class="btn btn-ghost" onclick="copyResultText('#result-value')">Copy Result</button>
        <button class="btn btn-ghost" type="button" onclick="location.reload()">Reset</button>
      </div>
    </div>
    <div class="panel"><div class="info-block"><h2>Formula</h2><div class="formula">km/l = distance / fuel<br>mpg = km/l × 2.352</div></div></div>
  </div>
  <div class="info-block"><h2>Related Calculators</h2><div class="related-grid" id="related-grid"></div></div>
</main>
<div id="site-footer"></div>
<script src="../js/calc-data.js"></script>
<script src="../js/main.js"></script>
<script src="../js/theme.js"></script>
<script src="../js/calculator.js"></script>
<script>
document.getElementById("calc-form").addEventListener("submit", function(e){
  e.preventDefault();
  const d = parseFloat(document.getElementById("distance").value);
  const f = parseFloat(document.getElementById("fuel").value);
  const kml = d/f;
  const mpg = kml * (1.60934/3.78541);
  showResult("#result-box", `${formatNumber(kml)} km/l (${formatNumber(mpg)} mpg)`);
});
document.addEventListener("DOMContentLoaded", ()=>{
  const related = calcsByCategory("utilities").filter(c=>!c.url.includes("mileage-calculator")).slice(0,4);
  document.getElementById("related-grid").innerHTML = related.map(CalcUI.calcCard).join("");
});
</script>
</body>
</html>
