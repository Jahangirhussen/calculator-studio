<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Split Bill Calculator — Free Online Calculator | Calculator Studio</title>
<meta name="description" content="Split a restaurant bill evenly among people, with optional tip.">
<link rel="canonical" href="https://example.com/utilities/split-bill-calculator.html">
<link rel="icon" href="../images/logo-white.png">
<link rel="manifest" href="../manifest.json">
<link rel="apple-touch-icon" href="../images/logo-white.png">
<meta name="theme-color" content="#D4AF37">
<link rel="stylesheet" href="../css/style.css?v=2">
<link rel="stylesheet" href="../css/responsive.css?v=2">
<link rel="stylesheet" href="../css/animations.css?v=2">
</head>
<body>
<script>const ROOT="../";</script>
<div id="site-header"></div>
<main class="container">
  <div class="breadcrumb"><a href="../index.html">Home</a> / <a href="index.html">Utilities</a> / Split Bill Calculator</div>
  <h1 class="calc-page-title">Split Bill Calculator</h1>
  <p class="calc-page-desc">Split a bill evenly among any number of people, with an optional tip.</p>
  <div class="calc-layout">
    <div class="panel">
      <form id="calc-form">
        <div class="field-row">
          <div class="field"><label>Total Bill</label><input type="number" step="any" id="bill" required></div>
          <div class="field"><label>Number of People</label><input type="number" id="people" min="1" value="2" required></div>
        </div>
        <div class="field"><label>Tip (%)</label><input type="number" step="any" id="tip" value="0"></div>
        <button type="submit" class="btn btn-solid">Calculate</button>
      </form>
      <div class="result-box hidden" id="result-box">
        <div class="label">Per Person</div>
        <div class="value" id="result-value">—</div>
      </div>
      <div class="action-row">
        <button class="btn btn-ghost" onclick="copyResultText('#result-value')">Copy Result</button>
        <button class="btn btn-ghost" type="button" onclick="location.reload()">Reset</button>
      </div>
    </div>
    <div class="panel"><div class="info-block"><h2>Formula</h2><div class="formula">per person = bill × (1 + tip/100) / people</div></div></div>
  </div>
  <div class="info-block"><h2>Related Calculators</h2><div class="related-grid" id="related-grid"></div></div>
</main>
<div id="site-footer"></div>
<script src="../js/calc-data.js"></script>
<script src="../js/main.js?v=2"></script>
<script src="../js/theme.js?v=2"></script>
<script src="../js/calculator.js"></script>
<script>
document.getElementById("calc-form").addEventListener("submit", function(e){
  e.preventDefault();
  const bill = parseFloat(document.getElementById("bill").value);
  const people = parseInt(document.getElementById("people").value);
  const tip = parseFloat(document.getElementById("tip").value)||0;
  const total = bill*(1+tip/100);
  showResult("#result-box", formatNumber(total/people) + ` (total: ${formatNumber(total)})`);
});
document.addEventListener("DOMContentLoaded", ()=>{
  const related = calcsByCategory("utilities").filter(c=>!c.url.includes("split-bill-calculator")).slice(0,4);
  document.getElementById("related-grid").innerHTML = related.map(CalcUI.calcCard).join("");
});
</script>
</body>
</html>
