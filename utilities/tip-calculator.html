<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tip Calculator — Free Online Calculator | Calculator Studio</title>
<meta name="description" content="Calculate tip amount, total bill and per-person share.">
<link rel="canonical" href="https://example.com/utilities/tip-calculator.html">
<link rel="icon" href="../images/logo.png">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/responsive.css">
<link rel="stylesheet" href="../css/animations.css">
</head>
<body>
<script>const ROOT="../";</script>
<div id="site-header"></div>
<main class="container">
  <div class="breadcrumb"><a href="../index.html">Home</a> / <a href="index.html">Utilities</a> / Tip Calculator</div>
  <h1 class="calc-page-title">Tip Calculator</h1>
  <p class="calc-page-desc">Calculate tip amount and total bill, optionally split among people.</p>
  <div class="calc-layout">
    <div class="panel">
      <form id="calc-form">
        <div class="field"><label>Bill Amount</label><input type="number" step="any" id="bill" required></div>
        <div class="field"><label>Tip %</label>
          <div class="action-row" style="margin:0 0 10px">
            <button type="button" class="btn btn-ghost tip-btn" data-tip="10">10%</button>
            <button type="button" class="btn btn-ghost tip-btn" data-tip="15">15%</button>
            <button type="button" class="btn btn-ghost tip-btn" data-tip="20">20%</button>
          </div>
          <input type="number" step="any" id="tip" value="15">
        </div>
        <div class="field"><label>Number of People</label><input type="number" id="people" min="1" value="1"></div>
        <button type="submit" class="btn btn-solid">Calculate</button>
      </form>
      <div class="result-box hidden" id="result-box">
        <div class="label">Tip / Total / Per Person</div>
        <div class="value" id="result-value">—</div>
      </div>
      <div class="action-row">
        <button class="btn btn-ghost" onclick="copyResultText('#result-value')">Copy Result</button>
        <button class="btn btn-ghost" type="button" onclick="location.reload()">Reset</button>
      </div>
    </div>
    <div class="panel"><div class="info-block"><h2>Formula</h2><div class="formula">tip = bill × tip% / 100<br>total = bill + tip</div></div></div>
  </div>
  <div class="info-block"><h2>Related Calculators</h2><div class="related-grid" id="related-grid"></div></div>
</main>
<div id="site-footer"></div>
<script src="../js/calc-data.js"></script>
<script src="../js/main.js"></script>
<script src="../js/theme.js"></script>
<script src="../js/calculator.js"></script>
<script>
document.querySelectorAll(".tip-btn").forEach(btn=>{
  btn.addEventListener("click", ()=> document.getElementById("tip").value = btn.dataset.tip);
});
document.getElementById("calc-form").addEventListener("submit", function(e){
  e.preventDefault();
  const bill = parseFloat(document.getElementById("bill").value);
  const tipPct = parseFloat(document.getElementById("tip").value)||0;
  const people = parseInt(document.getElementById("people").value)||1;
  const tip = bill*tipPct/100;
  const total = bill+tip;
  showResult("#result-box", `Tip: ${formatNumber(tip)} | Total: ${formatNumber(total)} | Per Person: ${formatNumber(total/people)}`);
});
document.addEventListener("DOMContentLoaded", ()=>{
  const related = calcsByCategory("utilities").filter(c=>!c.url.includes("tip-calculator")).slice(0,4);
  document.getElementById("related-grid").innerHTML = related.map(CalcUI.calcCard).join("");
});
</script>
</body>
</html>
