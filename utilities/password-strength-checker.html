<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Strength Checker — Free Online Tool | Calculator Studio</title>
<meta name="description" content="Check how strong your password is with real-time analysis.">
<link rel="canonical" href="https://example.com/utilities/password-strength-checker.html">
<link rel="icon" href="../images/logo-white.png">
<link rel="manifest" href="../manifest.json">
<link rel="apple-touch-icon" href="../images/logo-white.png">
<meta name="theme-color" content="#D4AF37">
<link rel="stylesheet" href="../css/style.css?v=2">
<link rel="stylesheet" href="../css/responsive.css?v=2">
<link rel="stylesheet" href="../css/animations.css?v=2">
<style>
.meter{height:10px;border-radius:6px;background:var(--card-alt);overflow:hidden;margin:10px 0}
.meter-fill{height:100%;transition:width .3s,background .3s}
.crit{display:flex;gap:6px;align-items:center;font-size:.85rem;padding:4px 0;color:var(--text-soft)}
.crit.ok{color:var(--gold)}
</style>
</head>
<body>
<script>const ROOT="../";</script>
<div id="site-header"></div>
<main class="container">
  <div class="breadcrumb"><a href="../index.html">Home</a> / <a href="index.html">Utilities</a> / Password Strength Checker</div>
  <h1 class="calc-page-title">Password Strength Checker</h1>
  <p class="calc-page-desc">Check how strong your password is in real time.</p>
  <div class="calc-layout">
    <div class="panel">
      <div class="field">
        <label>Password</label>
        <div style="display:flex;gap:8px">
          <input type="password" id="pw" style="flex:1">
          <button type="button" class="btn btn-ghost" id="toggle-pw">Show</button>
        </div>
      </div>
      <div class="meter"><div class="meter-fill" id="meter-fill" style="width:0%;background:#666"></div></div>
      <div id="strength-label" style="font-weight:700;margin-bottom:10px">—</div>
      <div id="criteria"></div>
    </div>
    <div class="panel"><div class="info-block"><h2>Criteria Checked</h2><p>Length ≥ 8, uppercase letter, lowercase letter, number, symbol.</p></div></div>
  </div>
  <div class="info-block"><h2>Related Calculators</h2><div class="related-grid" id="related-grid"></div></div>
</main>
<div id="site-footer"></div>
<script src="../js/calc-data.js"></script>
<script src="../js/main.js?v=2"></script>
<script src="../js/theme.js?v=2"></script>
<script>
const pwInput = document.getElementById("pw");
document.getElementById("toggle-pw").addEventListener("click", function(){
  pwInput.type = pwInput.type==="password" ? "text" : "password";
  this.textContent = pwInput.type==="password" ? "Show" : "Hide";
});
const criteriaList = [
  { label:"At least 8 characters", test: p=>p.length>=8 },
  { label:"Contains uppercase letter", test: p=>/[A-Z]/.test(p) },
  { label:"Contains lowercase letter", test: p=>/[a-z]/.test(p) },
  { label:"Contains number", test: p=>/[0-9]/.test(p) },
  { label:"Contains symbol", test: p=>/[^A-Za-z0-9]/.test(p) },
];
const colors = ["#e33","#e77","#eb3","#8c3","#3c6"];
const labels = ["Very Weak","Weak","Fair","Good","Strong"];
pwInput.addEventListener("input", ()=>{
  const val = pwInput.value;
  const results = criteriaList.map(c=>c.test(val));
  const score = results.filter(Boolean).length;
  document.getElementById("criteria").innerHTML = criteriaList.map((c,i)=>
    `<div class="crit ${results[i]?'ok':''}">${results[i]?'✔':'○'} ${c.label}</div>`
  ).join("");
  const idx = val.length===0 ? 0 : score;
  document.getElementById("meter-fill").style.width = (idx/5*100)+"%";
  document.getElementById("meter-fill").style.background = colors[Math.max(0,idx-1)]||colors[0];
  document.getElementById("strength-label").textContent = val.length===0 ? "—" : labels[Math.max(0,idx-1)];
});
document.addEventListener("DOMContentLoaded", ()=>{
  const related = calcsByCategory("utilities").filter(c=>!c.url.includes("password-strength-checker")).slice(0,4);
  document.getElementById("related-grid").innerHTML = related.map(CalcUI.calcCard).join("");
});
</script>
</body>
</html>
