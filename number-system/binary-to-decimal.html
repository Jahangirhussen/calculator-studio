<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binary to Decimal Converter — Free Online Calculator | Calculator Studio</title>
<meta name="description" content="Convert binary numbers to decimal instantly.">
<link rel="canonical" href="https://example.com/number-system/binary-to-decimal.html">
<link rel="icon" href="../images/logo-white.png">
<link rel="manifest" href="../manifest.json">
<link rel="apple-touch-icon" href="../images/logo-white.png">
<meta name="theme-color" content="#D4AF37">
<link rel="stylesheet" href="../css/style.css?v=2">
<link rel="stylesheet" href="../css/responsive.css?v=2">
<link rel="stylesheet" href="../css/animations.css?v=2">
</head>
<body>
<script>const ROOT="../";</script>
<div id="site-header"></div>
<main class="container">
  <div class="breadcrumb"><a href="../index.html">Home</a> / <a href="index.html">Number System</a> / Binary to Decimal</div>
  <h1 class="calc-page-title">Binary to Decimal Converter</h1>
  <p class="calc-page-desc">Convert any binary number to its decimal (base-10) equivalent.</p>
  <div class="calc-layout">
    <div class="panel">
      <form id="calc-form">
        <div class="field"><label>Binary Number</label><input type="text" id="bin" pattern="[01]+" placeholder="e.g. 1011" required></div>
        <button type="submit" class="btn btn-solid">Convert</button>
      </form>
      <div class="result-box hidden" id="result-box">
        <div class="label">Decimal</div>
        <div class="value" id="result-value">—</div>
      </div>
      <div class="action-row">
        <button class="btn btn-ghost" onclick="copyResultText('#result-value')">Copy Result</button>
        <button class="btn btn-ghost" onclick="shareCurrentPage()">Share</button>
        <button class="btn btn-ghost" type="button" onclick="location.reload()">Reset</button>
      </div>
    </div>
    <div class="panel"><div class="info-block"><h2>Formula</h2><div class="formula">decimal = sum(bit × 2^position)</div><h2>Example</h2><p>1011₂ = 1×8+0×4+1×2+1×1 = 11</p></div></div>
  </div>
  <div class="info-block"><h2>Related Calculators</h2><div class="related-grid" id="related-grid"></div></div>
</main>
<div id="site-footer"></div>
<script src="../js/calc-data.js"></script>
<script src="../js/main.js?v=2"></script>
<script src="../js/theme.js?v=2"></script>
<script src="../js/calculator.js"></script>
<script>
document.getElementById("calc-form").addEventListener("submit", function(e){
  e.preventDefault();
  const bin = document.getElementById("bin").value.trim();
  if(!/^[01]+$/.test(bin)){ showResult("#result-box","Invalid binary number"); return; }
  showResult("#result-box", parseInt(bin,2).toString());
});
document.addEventListener("DOMContentLoaded", ()=>{
  const related = calcsByCategory("number-system").filter(c=>!c.url.includes("binary-to-decimal")).slice(0,4);
  document.getElementById("related-grid").innerHTML = related.map(CalcUI.calcCard).join("");
});
</script>
</body>
</html>
