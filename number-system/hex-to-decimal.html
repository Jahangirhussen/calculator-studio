<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hexadecimal to Decimal Converter — Free Online Calculator | Calculator Studio</title>
<meta name="description" content="Convert hexadecimal numbers to decimal instantly.">
<link rel="canonical" href="https://example.com/number-system/hex-to-decimal.html">
<link rel="icon" href="../images/logo-white.png">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/responsive.css">
<link rel="stylesheet" href="../css/animations.css">
</head>
<body>
<script>const ROOT="../";</script>
<div id="site-header"></div>
<main class="container">
  <div class="breadcrumb"><a href="../index.html">Home</a> / <a href="index.html">Number System</a> / Hexadecimal to Decimal</div>
  <h1 class="calc-page-title">Hexadecimal to Decimal Converter</h1>
  <p class="calc-page-desc">Convert hexadecimal (base-16) numbers to decimal.</p>
  <div class="calc-layout">
    <div class="panel">
      <form id="calc-form">
        <div class="field"><label>Hexadecimal Number</label><input type="text" id="hex" pattern="[0-9a-fA-F]+" placeholder="e.g. 1F" required></div>
        <button type="submit" class="btn btn-solid">Convert</button>
      </form>
      <div class="result-box hidden" id="result-box">
        <div class="label">Decimal</div>
        <div class="value" id="result-value">—</div>
      </div>
      <div class="action-row">
        <button class="btn btn-ghost" onclick="copyResultText('#result-value')">Copy Result</button>
        <button class="btn btn-ghost" onclick="shareCurrentPage()">Share</button>
        <button class="btn btn-ghost" type="button" onclick="location.reload()">Reset</button>
      </div>
    </div>
    <div class="panel"><div class="info-block"><h2>Example</h2><p>1F₁₆ = 31₁₀</p></div></div>
  </div>
  <div class="info-block"><h2>Related Calculators</h2><div class="related-grid" id="related-grid"></div></div>
</main>
<div id="site-footer"></div>
<script src="../js/calc-data.js"></script>
<script src="../js/main.js"></script>
<script src="../js/theme.js"></script>
<script src="../js/calculator.js"></script>
<script>
document.getElementById("calc-form").addEventListener("submit", function(e){
  e.preventDefault();
  const hex = document.getElementById("hex").value.trim();
  if(!/^[0-9a-fA-F]+$/.test(hex)){ showResult("#result-box","Invalid hex number"); return; }
  showResult("#result-box", parseInt(hex,16).toString());
});
document.addEventListener("DOMContentLoaded", ()=>{
  const related = calcsByCategory("number-system").filter(c=>!c.url.includes("hex-to-decimal")).slice(0,4);
  document.getElementById("related-grid").innerHTML = related.map(CalcUI.calcCard).join("");
});
</script>
</body>
</html>
